services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot
    restart: unless-stopped
    environment:
      - WAHA_URL=${WAHA_URL}
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - PORT=${PORT:-3000}
      - WHATSAPP_HOOK_HMAC_KEY=${WHATSAPP_HOOK_HMAC_KEY:-}
      - ALLOWED_CHATS=${ALLOWED_CHATS:-}
      # WAHA Engine Configuration
      - WHATSAPP_DEFAULT_ENGINE=${WHATSAPP_DEFAULT_ENGINE:-WEBJS}
      - WHATSAPP_WEBJS_PUPPETER_ARGS=${WHATSAPP_WEBJS_PUPPETER_ARGS:-"--no-sandbox"}
    volumes:
      - ./logs:/app/logs
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  bot-network:
    driver: bridge
